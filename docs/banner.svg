    <circle cx="40" cy="20" r="6" fill="#f59e0b"/>
    <circle cx="60" cy="20" r="6" fill="#10b981"/>
    
    <rect x="20" y="45" width="410" height="130" rx="8" fill="rgba(0,0,0,0.4)"/>
    
    <text x="35" y="75" font-family="monospace" font-size="13" fill="#64748b"># Quick Start</text>
    <text x="35" y="100" font-family="monospace" font-size="13" fill="#818cf8">from</text>
    <text x="70" y="100" font-family="monospace" font-size="13" fill="white">openai</text>
    <text x="130" y="100" font-family="monospace" font-size="13" fill="#818cf8">import</text>
    <text x="180" y="100" font-family="monospace" font-size="13" fill="white">OpenAI</text>
    
    <text x="35" y="125" font-family="monospace" font-size="13" fill="white">client =</text>
    <text x="110" y="125" font-family="monospace" font-size="13" fill="#f472b6">OpenAI</text>
    <text x="165" y="125" font-family="monospace" font-size="13" fill="white">(</text>
    
    <text x="50" y="150" font-family="monospace" font-size="13" fill="#22d3ee">base_url</text>
    <text x="125" y="150" font-family="monospace" font-size="13" fill="white">=</text>
    <text x="140" y="150" font-family="monospace" font-size="13" fill="#10b981">"http://localhost:8000/v1"</text>
    
    <text x="50" y="175" font-family="monospace" font-size="13" fill="#22d3ee">api_key</text>
    <text x="110" y="175" font-family="monospace" font-size="13" fill="white">=</text>
    <text x="125" y="175" font-family="monospace" font-size="13" fill="#10b981">"local-qwen"</text>
    
    <text x="35" y="200" font-family="monospace" font-size="13" fill="white">)</text>
    
    <rect x="20" y="210" width="410" height="115" rx="8" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    
    <text x="35" y="240" font-family="monospace" font-size="12" fill="#64748b"># Generate an image</text>
    <text x="35" y="265" font-family="monospace" font-size="13" fill="white">response = client.</text>
    <text x="175" y="265" font-family="monospace" font-size="13" fill="#f472b6">images.generate</text>
    <text x="305" y="265" font-family="monospace" font-size="13" fill="white">(</text>
    
    <text x="50" y="290" font-family="monospace" font-size="13" fill="#22d3ee">prompt</text>
    <text x="100" y="290" font-family="monospace" font-size="13" fill="white">=</text>
    <text x="115" y="290" font-family="monospace" font-size="13" fill="#10b981">"A cyberpunk city"</text>
    
    <text x="35" y="315" font-family="monospace" font-size="13" fill="white">)</text>
