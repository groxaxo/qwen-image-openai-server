    <text x="35" y="82" font-family="'JetBrains Mono', monospace" font-size="13" fill="#64748b" font-weight="400"># Quick Start with OpenAI SDK</text>
    <text x="35" y="108" font-family="'JetBrains Mono', monospace" font-size="13" fill="#818cf8" font-weight="500">from</text>
    <text x="72" y="108" font-family="'JetBrains Mono', monospace" font-size="13" fill="#e2e8f0" font-weight="400">openai</text>
    <text x="132" y="108" font-family="'JetBrains Mono', monospace" font-size="13" fill="#818cf8" font-weight="500">import</text>
    <text x="188" y="108" font-family="'JetBrains Mono', monospace" font-size="13" fill="#e2e8f0" font-weight="400">OpenAI</text>
    
    <text x="35" y="134" font-family="'JetBrains Mono', monospace" font-size="13" fill="#e2e8f0" font-weight="400">client =</text>
    <text x="110" y="134" font-family="'JetBrains Mono', monospace" font-size="13" fill="#f472b6" font-weight="500">OpenAI</text>
    <text x="170" y="134" font-family="'JetBrains Mono', monospace" font-size="13" fill="#e2e8f0" font-weight="400">(</text>
    
    <text x="50" y="160" font-family="'JetBrains Mono', monospace" font-size="13" fill="#22d3ee" font-weight="400">base_url</text>
    <text x="130" y="160" font-family="'JetBrains Mono', monospace" font-size="13" fill="#e2e8f0" font-weight="400">=</text>
    <text x="148" y="160" font-family="'JetBrains Mono', monospace" font-size="13" fill="#10b981" font-weight="400">"http://localhost:8000/v1"</text>
    
    <text x="50" y="186" font-family="'JetBrains Mono', monospace" font-size="13" fill="#22d3ee" font-weight="400">api_key</text>
    <text x="115" y="186" font-family="'JetBrains Mono', monospace" font-size="13" fill="#e2e8f0" font-weight="400">=</text>
    <text x="133" y="186" font-family="'JetBrains Mono', monospace" font-size="13" fill="#10b981" font-weight="400">"local-qwen"</text>
    
    <text x="35" y="186" font-family="'JetBrains Mono', monospace" font-size="13" fill="#e2e8f0" font-weight="400">)</text>
    
    <rect x="20" y="210" width="450" height="140" rx="12" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
    
    <text x="35" y="242" font-family="'JetBrains Mono', monospace" font-size="12" fill="#64748b" font-weight="400"># Generate stunning images</text>
    <text x="35" y="268" font-family="'JetBrains Mono', monospace" font-size="13" fill="#e2e8f0" font-weight="400">response = client.</text>
    <text x="180" y="268" font-family="'JetBrains Mono', monospace" font-size="13" fill="#f472b6" font-weight="500">images.generate</text>
