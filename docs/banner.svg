    <text x="105" y="294" font-family="'JetBrains Mono', monospace" font-size="13" fill="#e2e8f0" font-weight="400">=</text>
    <text x="123" y="294" font-family="'JetBrains Mono', monospace" font-size="13" fill="#10b981" font-weight="400">"A cyberpunk city"</text>
    
    <text x="50" y="320" font-family="'JetBrains Mono', monospace" font-size="13" fill="#22d3ee" font-weight="400">size</text>
    <text x="85" y="320" font-family="'JetBrains Mono', monospace" font-size="13" fill="#e2e8f0" font-weight="400">=</text>
    <text x="103" y="320" font-family="'JetBrains Mono', monospace" font-size="13" fill="#10b981" font-weight="400">"1024x1024"</text>
    
    <text x="35" y="346" font-family="'JetBrains Mono', monospace" font-size="13" fill="#e2e8f0" font-weight="400">)</text>
